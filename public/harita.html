<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<title>Zihin Haritası — Notlar Sync</title>
<style>
  :root {
    --bg: #131019; --panel: #1c1826; --edge: #332c46;
    --text: #ece8f5; --text-muted: #9891a8; --text-dim: #6b6480;
    --c-user: #5ec8c0; --c-feedback: #ef7fb1; --c-project: #e0b34d;
    --c-reference: #7fd88f; --c-not: #a78bfa; --c-ghost: #6b6480;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; overflow: hidden; }
  .mono { font-family: ui-monospace, "JetBrains Mono", "Cascadia Code", "SF Mono", Consolas, monospace; }

  #app { position: relative; width: 100vw; height: 100vh; }
  canvas { position: absolute; inset: 0; cursor: grab; }
  canvas.dragging { cursor: grabbing; }

  #topbar { position: absolute; top: 16px; left: 16px; right: 16px; z-index: 5;
    display: flex; align-items: flex-start; justify-content: space-between; gap: 16px;
    pointer-events: none; }
  #topbar > * { pointer-events: auto; }

  .brand { font-size: 13px; color: var(--text-muted); }
  .brand strong { color: var(--text); font-size: 15px; display: block; margin-bottom: 2px; }

  #search {
    background: var(--panel); border: 1px solid var(--edge); color: var(--text);
    border-radius: 8px; padding: 8px 12px; font-size: 13px; width: 220px; outline: none;
  }
  #search::placeholder { color: var(--text-dim); }
  #search:focus { border-color: var(--c-not); }

  #aiToggle {
    display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted);
    background: var(--panel); border: 1px solid var(--edge); border-radius: 8px;
    padding: 8px 12px; cursor: pointer; user-select: none; white-space: nowrap;
  }
  #aiToggle input { accent-color: var(--c-not); margin: 0; }

  #sugBtn, #rprBtn {
    background: var(--panel); border: 1px solid var(--edge); color: var(--text-muted);
    border-radius: 8px; padding: 8px 12px; font-size: 12px; cursor: pointer; white-space: nowrap;
  }
  #sugBtn:hover, #rprBtn:hover { color: var(--text); }
  #sugBtn.on { color: var(--c-feedback); border-color: var(--c-feedback); }

  /* 📊 zihin raporu paneli (sol tarafta acilir) */
  #rapor {
    position: absolute; top: 64px; left: 16px; bottom: 64px; width: 360px; z-index: 6;
    background: var(--panel); border: 1px solid var(--edge); border-radius: 12px;
    padding: 18px; overflow-y: auto; transform: translateX(-400px); transition: transform 0.2s ease;
  }
  #rapor.open { transform: translateX(0); }
  #rapor h2 { font-size: 15px; margin: 0 0 10px; }
  #rapor .close { position: absolute; top: 14px; right: 16px; background: none; border: none;
    color: var(--text-dim); font-size: 18px; cursor: pointer; line-height: 1; }
  .rTitle { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--text-dim); margin: 14px 0 6px; }
  .rLine { font-size: 12.5px; color: var(--text-muted); padding: 4px 0;
    border-bottom: 1px solid var(--edge); line-height: 1.5; }
  .rLine.clickable { cursor: pointer; color: var(--text); }
  .rLine.clickable:hover { color: var(--c-feedback); }
  .rLine.dim { color: var(--text-dim); border: none; margin-top: 10px; font-size: 11.5px; }
  #sorKutu input {
    width: 100%; background: var(--bg); border: 1px solid var(--edge); color: var(--text);
    border-radius: 8px; padding: 8px 10px; font-size: 12.5px; outline: none;
  }
  #sorKutu input:focus { border-color: var(--c-not); }
  #sorCevap { font-size: 12.5px; color: var(--text-muted); line-height: 1.6;
    margin-top: 8px; white-space: pre-wrap; }
  #sorCevap .kaynaklar { color: var(--text-dim); font-size: 11px; margin-top: 6px; }
  .conn .rel { color: var(--text-dim); font-size: 11px; }
  .conn.sug { color: var(--c-feedback); }
  .conn .kabul {
    float: right; background: none; border: 1px solid var(--edge); color: var(--text-muted);
    border-radius: 6px; font-size: 10.5px; padding: 1px 7px; cursor: pointer;
  }
  .conn .kabul:hover { color: var(--c-feedback); border-color: var(--c-feedback); }

  #legend {
    position: absolute; bottom: 16px; left: 16px; z-index: 5;
    background: var(--panel); border: 1px solid var(--edge); border-radius: 10px;
    padding: 10px 12px; display: flex; flex-wrap: wrap; gap: 8px 14px; max-width: 60vw;
  }
  .legend-item {
    display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted);
    cursor: pointer; user-select: none;
  }
  .legend-item.off { opacity: 0.35; }
  .legend-item .sw { width: 9px; height: 9px; border-radius: 50%; flex: none; }

  #hint { position: absolute; bottom: 16px; right: 16px; z-index: 5; font-size: 11px;
    color: var(--text-dim); text-align: right; line-height: 1.6; }

  #panel {
    position: absolute; top: 16px; right: 16px; bottom: 16px; width: 300px; z-index: 6;
    background: var(--panel); border: 1px solid var(--edge); border-radius: 12px;
    padding: 18px; overflow-y: auto; transform: translateX(340px); transition: transform 0.2s ease;
  }
  #panel.open { transform: translateX(0); }
  #panel .type-pill {
    display: inline-block; font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.06em;
    padding: 2px 8px; border-radius: 999px; margin-bottom: 10px;
  }
  #panel h2 { font-size: 17px; margin: 0 0 4px; text-wrap: balance; }
  #panel .file { font-size: 11px; color: var(--text-dim); margin-bottom: 12px; }
  #panel .desc { font-size: 13px; color: var(--text-muted); line-height: 1.55; margin-bottom: 16px; }
  #panel .conn-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--text-dim); margin-bottom: 8px; }
  #panel .conn { display: block; width: 100%; text-align: left; background: none; border: none;
    color: var(--text); font-size: 12.5px; padding: 6px 0; border-bottom: 1px solid var(--edge);
    cursor: pointer; }
  #panel .conn:hover { color: var(--c-not); }
  #panel .close { position: absolute; top: 14px; right: 16px; background: none; border: none;
    color: var(--text-dim); font-size: 18px; cursor: pointer; line-height: 1; }
</style>
</head>
<body>
<div id="app">
  <canvas id="cv"></canvas>
  <div id="topbar">
    <div class="brand mono"><strong>🕸️ Zihin Haritası</strong>notlar arası bağlantılar</div>
    <div style="display:flex;gap:10px;align-items:flex-start">
      <button id="rprBtn" title="Zihin raporu: sağlık, öbek bütünlüğü, şaşırtıcı bağlantılar, sorulmaya değer sorular">📊 rapor</button>
      <button id="sugBtn" title="Local AI (Ollama) içerikten bağlantı ÖNERİR — öneriler kuyrukta bekler, sen kabul etmeden nota yazılmaz; reddedilen bir daha önerilmez">🤖 öneri</button>
      <div id="expWrap" style="position:relative;display:none">
        <button id="expBtn" title="Haritayı dışa aktar (zihin-haritasi motoru): SVG, GraphML, Neo4j, Obsidian kasası, wiki">⬇ dışa aktar</button>
        <div id="expMenu" style="display:none;position:absolute;right:0;top:110%;background:#1e1e2e;border:1px solid #45475a;border-radius:8px;padding:4px;z-index:9;min-width:130px"></div>
      </div>
      <label id="aiToggle" title="AI ajanlarının tuttuğu AI-Hafiza notlarını haritaya dahil et">
        <input type="checkbox" id="showAI"> 🧠 AI notları
      </label>
      <input id="search" type="text" placeholder="ara…">
    </div>
  </div>
  <div id="legend"></div>
  <div id="hint">sürükle: taşı · tekerlek: yakınlaştır · boş alan: kaydır · <b>f</b>: ekrana sığdır<br><b>shift+tık</b> iki düğüm: aradaki yolu göster · kesikli pembe çizgi: AI önerisi (✚ kabul → nota yazılır, ✗ ret → bir daha önerilmez)</div>
  <div id="rapor">
    <button class="close" id="raporClose">✕</button>
    <h2>📊 Zihin Raporu</h2>
    <div id="sorKutu">
      <input id="sorInput" placeholder="💬 zihne sor — örn: prompt injection hakkında ne biriktirdim?">
      <div id="sorCevap"></div>
    </div>
    <div id="raporBody">yükleniyor…</div>
  </div>
  <div id="panel">
    <button class="close" id="panelClose">✕</button>
    <span class="type-pill" id="pType"></span>
    <h2 id="pTitle"></h2>
    <div class="file mono" id="pFile"></div>
    <div class="desc" id="pDesc"></div>
    <div class="conn-title" id="pConnTitle"></div>
    <div id="pConns"></div>
  </div>
</div>
<script>
// Uygulama icindeki canli harita: veri /api/graph'tan gelir, notlar
// degisince WebSocket sinyaliyle yeniden cekilir (dugum konumlari korunur).
let DATA = { nodes: [], edges: [] };
const COLORS = {
  user: '#5ec8c0', feedback: '#ef7fb1', project: '#e0b34d',
  reference: '#7fd88f', not: '#a78bfa', ghost: '#6b6480'
};
const TYPE_LABELS = { user: 'kullanıcı', feedback: 'geri bildirim', project: 'proje',
  reference: 'referans', not: 'not', ghost: 'eksik / hayalet' };

const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
let W, H, DPR;
function resize() {
  DPR = window.devicePixelRatio || 1;
  W = cv.clientWidth; H = cv.clientHeight;
  cv.width = W * DPR; cv.height = H * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resize);
cv.style.width = '100%'; cv.style.height = '100%';
resize();

let byId = {};
let nodes = [];
let edges = [];

// grafi (yeniden) yukle. Onceki konumlar korunur: ayni id tekrar gelirse
// yerinde kalir, sadece yeni dugumler daireye serpilir - harita zipmaz.
function loadGraph(data) {
  DATA = data;
  const prev = byId;
  byId = {};
  nodes = DATA.nodes.map((n, i) => {
    const old = prev[n.id];
    const angle = (i / (DATA.nodes.length || 1)) * Math.PI * 2;
    const o = Object.assign({}, n, old ? { x: old.x, y: old.y, vx: 0, vy: 0, fixed: false }
      : {
        x: W / 2 + Math.cos(angle) * 120 + (Math.random() - 0.5) * 40,
        y: H / 2 + Math.sin(angle) * 120 + (Math.random() - 0.5) * 40,
        vx: 0, vy: 0, fixed: false,
      });
    byId[o.id] = o;
    return o;
  });
  edges = DATA.edges
    .map(e => ({ a: byId[e.source], b: byId[e.target], rel: e.relation || null }))
    .filter(e => e.a && e.b);
  nodes.forEach(n => {
    n.conns = edges.filter(e => e.a === n || e.b === n)
      .map(e => ({ node: e.a === n ? e.b : e.a, rel: e.rel }));
  });
  // notlar degisti: eski oneriler/yol bayatlamis olabilir, dugum kalktiysa temizle
  sugEdges = sugEdges.filter(s => byId[s.source] && byId[s.target]);
  pathIds = pathIds.filter(id => byId[id]);
  sugBadge();
  buildLegend();
  reheat();
}

// --- AI onerileri: SUNUCUDAKI kalici kuyruk (zihin.json). Kabul edilmeden
// notlara YAZILMAZ; kabul/ret sunucuya POST'lanir, gunluge islenir, tum
// cihazlarda ayni anda gorunur. Ollama'nin da dis AI ajanlarin da onerileri
// ayni kuyruga duser (kaynak: 'ollama' | 'ajan').
let sugEdges = []; // {id, source, target, sourceLabel, targetLabel, neden, kaynak}
function sugFor(n) {
  return sugEdges.filter(s => s.source === n.id || s.target === n.id)
    .map(s => ({ node: byId[s.source === n.id ? s.target : s.source], neden: s.neden, sug: s }));
}
async function zihinPost(path, body) {
  const q = params.get('key') ? '?key=' + encodeURIComponent(params.get('key')) : '';
  const r = await fetch(path + q, { method: 'POST', body: JSON.stringify(body || {}) });
  if (!r.ok) throw new Error(await r.text());
  return r.text();
}
async function refreshOneriler() {
  try {
    const q = params.get('key') ? '?key=' + encodeURIComponent(params.get('key')) : '';
    const st = await fetch('/api/graph/oneriler' + q).then(r => r.json());
    sugEdges = (st.oneriler || []).filter(s => byId[s.source] && byId[s.target]);
  } catch (e) { /* sunucu gecici kapali olabilir */ }
  sugBadge();
  if (selectedNode) selectNode(selectedNode);
}

// --- yol vurgusu: shift+tik ile secilen iki dugum arasi BFS (istemci tarafi) ---
let pathIds = [], pathPick = null;
function findPath(a, b) {
  const prev = new Map([[a.id, null]]);
  const q = [a.id];
  while (q.length) {
    const cur = q.shift();
    if (cur === b.id) {
      const out = [];
      for (let n = b.id; n !== null; n = prev.get(n)) out.unshift(n);
      return out;
    }
    for (const c of byId[cur].conns) if (!prev.has(c.node.id)) { prev.set(c.node.id, cur); q.push(c.node.id); }
  }
  return [];
}
function onPath(a, b) {
  for (let i = 0; i < pathIds.length - 1; i++)
    if ((pathIds[i] === a.id && pathIds[i+1] === b.id) || (pathIds[i] === b.id && pathIds[i+1] === a.id)) return true;
  return false;
}

let camX = 0, camY = 0, zoom = 1;
let hoverNode = null, selectedNode = null;
let searchTerm = '';
const hiddenTypes = new Set();

function radius(n) { return Math.max(5, Math.min(22, 6 + n.degree * 1.7)); }

// yerlesim oturunca simulasyon duraklar (tiklamak kolaylassin);
// dugum suruklenince tekrar isinir. Kuvvetler zayiflatilmaz - sadece
// "artik kimse kipirdamiyor" olcumu yapilir, yoksa uzak dugumler donup kalir.
let settled = false, calmFrames = 0;
function reheat() { settled = false; calmFrames = 0; }

function step() {
  if (settled) return;
  const REPEL = 2600, SPRING = 0.012, IDEAL = 90, CENTER = 0.0015, DAMP = 0.86;
  for (let i = 0; i < nodes.length; i++) {
    const n = nodes[i];
    if (n.fixed) continue;
    let fx = 0, fy = 0;
    for (let j = 0; j < nodes.length; j++) {
      if (i === j) continue;
      const m = nodes[j];
      let dx = n.x - m.x, dy = n.y - m.y;
      let d2 = dx * dx + dy * dy || 0.01;
      let d = Math.sqrt(d2);
      if (d > 260) continue;
      const f = REPEL / d2;
      fx += (dx / d) * f; fy += (dy / d) * f;
    }
    fx += (W / 2 - n.x) * CENTER;
    fy += (H / 2 - n.y) * CENTER;
    n.vx = (n.vx + fx) * DAMP;
    n.vy = (n.vy + fy) * DAMP;
  }
  for (const e of edges) {
    if (e.a.fixed && e.b.fixed) continue;
    const dx = e.b.x - e.a.x, dy = e.b.y - e.a.y;
    const d = Math.sqrt(dx * dx + dy * dy) || 0.01;
    const f = (d - IDEAL) * SPRING;
    const fx = (dx / d) * f, fy = (dy / d) * f;
    if (!e.a.fixed) { e.a.vx += fx; e.a.vy += fy; }
    if (!e.b.fixed) { e.b.vx -= fx; e.b.vy -= fy; }
  }
  let speed = 0;
  const VMAX = 2.5; // hiz siniri: uzun yaylarin sonsuz salinim yapmasini engeller
  for (const n of nodes) {
    if (n.fixed) continue;
    const v = Math.hypot(n.vx, n.vy);
    if (v > VMAX) { n.vx *= VMAX / v; n.vy *= VMAX / v; }
    n.x += n.vx; n.y += n.vy;
    speed += Math.abs(n.vx) + Math.abs(n.vy);
  }
  // 30 kare boyunca ortalama hiz esigin altindaysa yerlesim oturdu say.
  // Esik bilerek genis: milimetrik surunme bitmez, beklemek tiklamayi zorlastirir.
  if (speed / (nodes.length || 1) < 0.2) { if (++calmFrames > 30) settled = true; }
  else calmFrames = 0;
}

// yerlesim oturunca bir kez: tum dugumleri ekrana ortala/sigdir. Kullanici
// pan/zoom yaparsa bir daha otomatik mudahale etme.
let autoFit = true;
function fitView() {
  if (!nodes.length) return;
  const pad = 80;
  const xs = nodes.map(n => n.x), ys = nodes.map(n => n.y);
  const minX = Math.min(...xs), maxX = Math.max(...xs);
  const minY = Math.min(...ys), maxY = Math.max(...ys);
  const gw = Math.max(maxX - minX, 1), gh = Math.max(maxY - minY, 1);
  zoom = Math.min((W - pad * 2) / gw, (H - pad * 2) / gh, 1.4);
  zoom = Math.max(zoom, 0.2);
  camX = (W / zoom - (minX + maxX)) / 2;
  camY = (H / zoom - (minY + maxY)) / 2;
}

function worldToScreen(x, y) { return [(x + camX) * zoom, (y + camY) * zoom]; }
function screenToWorld(x, y) { return [x / zoom - camX, y / zoom - camY]; }

function dim(n) {
  if (hiddenTypes.has(n.type)) return true;
  if (searchTerm && !(n.label.toLowerCase().includes(searchTerm) || (n.description || '').toLowerCase().includes(searchTerm))) return true;
  return false;
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.save();
  ctx.translate(camX * zoom, camY * zoom);
  ctx.scale(zoom, zoom);

  for (const e of edges) {
    const faded = dim(e.a) || dim(e.b);
    const yolda = onPath(e.a, e.b);
    ctx.strokeStyle = yolda ? '#fff' : (COLORS[e.a.type] || COLORS.not);
    ctx.globalAlpha = yolda ? 0.9 : (faded ? 0.06 : 0.3);
    ctx.lineWidth = (yolda ? 2.5 : 1) / zoom;
    ctx.beginPath();
    ctx.moveTo(e.a.x, e.a.y); ctx.lineTo(e.b.x, e.b.y);
    ctx.stroke();
  }

  // AI onerileri: kesikli pembe - gercek kenarlarla karismasin
  ctx.setLineDash([5 / zoom, 5 / zoom]);
  for (const s of sugEdges) {
    const a = byId[s.source], b = byId[s.target];
    if (!a || !b || dim(a) || dim(b)) continue;
    ctx.strokeStyle = COLORS.feedback;
    ctx.globalAlpha = 0.5;
    ctx.lineWidth = 1.2 / zoom;
    ctx.beginPath();
    ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
    ctx.stroke();
  }
  ctx.setLineDash([]);

  for (const n of nodes) {
    const r = radius(n);
    const faded = dim(n);
    ctx.globalAlpha = faded ? 0.15 : 1;
    ctx.beginPath();
    ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
    if (n.ghost) {
      ctx.setLineDash([3 / zoom, 3 / zoom]);
      ctx.strokeStyle = COLORS.ghost;
      ctx.lineWidth = 1.5 / zoom;
      ctx.stroke();
      ctx.setLineDash([]);
    } else {
      ctx.fillStyle = COLORS[n.type] || COLORS.not;
      ctx.fill();
      if (n === hoverNode || n === selectedNode || n === pathPick || pathIds.includes(n.id)) {
        ctx.lineWidth = 2 / zoom;
        ctx.strokeStyle = '#fff';
        ctx.globalAlpha = faded ? 0.3 : 0.8;
        ctx.stroke();
      }
    }
    ctx.globalAlpha = faded ? 0.2 : 0.92;
    ctx.fillStyle = n.ghost ? COLORS.ghost : '#ece8f5';
    ctx.font = `${11 / zoom}px -apple-system, system-ui, sans-serif`;
    ctx.textBaseline = 'middle';
    ctx.fillText(n.label, n.x + r + 5 / zoom, n.y);
  }
  ctx.restore();
  ctx.globalAlpha = 1;
}

let frameNo = 0;
function frame() {
  step();
  frameNo++;
  // Ilk otomatik sigdirma GERCEK bir animasyon frame'inde yapilir: boylece
  // canvas layout'u (clientWidth/Height) kesin hazirdir. Yerlesim oturunca,
  // ya da en gec 90. karede bir kez sigdir; kullanici pan/zoom yapinca birak.
  if (autoFit && (settled || frameNo >= 90)) { fitView(); autoFit = false; }
  draw();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// --- etkilesim ---
let dragNode = null, panning = false, panStart = null, camStart = null, moved = false;

function nodeAt(px, py) {
  const [wx, wy] = screenToWorld(px, py);
  let best = null, bestD = Infinity;
  for (const n of nodes) {
    const d = Math.hypot(n.x - wx, n.y - wy);
    if (d < radius(n) + 4 && d < bestD) { best = n; bestD = d; }
  }
  return best;
}

cv.addEventListener('mousedown', (e) => {
  const rect = cv.getBoundingClientRect();
  const px = e.clientX - rect.left, py = e.clientY - rect.top;
  const n = nodeAt(px, py);
  moved = false;
  // shift+tik: yol secimi (1. dugum isaretlenir, 2. dugumde yol vurgulanir)
  if (n && e.shiftKey) {
    if (!pathPick) { pathPick = n; pathIds = []; }
    else { pathIds = findPath(pathPick, n); pathPick = null; }
    return;
  }
  if (!n) { pathIds = []; pathPick = null; } // bos alana tik: yolu temizle
  if (n) { dragNode = n; n.fixed = true; reheat(); }
  else { panning = true; autoFit = false; panStart = [px, py]; camStart = [camX, camY]; cv.classList.add('dragging'); }
});
window.addEventListener('mousemove', (e) => {
  const rect = cv.getBoundingClientRect();
  const px = e.clientX - rect.left, py = e.clientY - rect.top;
  if (dragNode) {
    moved = true;
    const [wx, wy] = screenToWorld(px, py);
    dragNode.x = wx; dragNode.y = wy; dragNode.vx = 0; dragNode.vy = 0;
  } else if (panning) {
    moved = true;
    camX = camStart[0] + (px - panStart[0]) / zoom;
    camY = camStart[1] + (py - panStart[1]) / zoom;
  } else {
    hoverNode = nodeAt(px, py);
    cv.style.cursor = hoverNode ? 'pointer' : 'grab';
  }
});
window.addEventListener('mouseup', (e) => {
  if (dragNode && !moved) selectNode(dragNode);
  if (dragNode) dragNode.fixed = false;
  dragNode = null; panning = false;
  cv.classList.remove('dragging');
});
// 'f' tusu: her an ekrana sigdir (kullanici kaybolursa toparlanabilsin)
window.addEventListener('keydown', (e) => {
  if (e.key === 'f' && document.activeElement.id !== 'search') fitView();
});
cv.addEventListener('wheel', (e) => {
  e.preventDefault();
  autoFit = false;
  const rect = cv.getBoundingClientRect();
  const px = e.clientX - rect.left, py = e.clientY - rect.top;
  const [wx, wy] = screenToWorld(px, py);
  zoom *= (e.deltaY < 0 ? 1.1 : 0.9);
  zoom = Math.max(0.2, Math.min(3, zoom));
  camX = px / zoom - wx; camY = py / zoom - wy;
}, { passive: false });

// --- panel ---
const panel = document.getElementById('panel');
function selectNode(n) {
  selectedNode = n;
  panel.classList.add('open');
  const pill = document.getElementById('pType');
  pill.textContent = TYPE_LABELS[n.type] || n.type;
  pill.style.background = (COLORS[n.type] || COLORS.not) + '26';
  pill.style.color = COLORS[n.type] || COLORS.not;
  document.getElementById('pTitle').textContent = n.label;
  const comm = (DATA.communities || []).find(c => c.id === n.community);
  document.getElementById('pFile').textContent =
    (n.file ? n.file : '(henüz yazılmamış)') + '  ·  ' + (comm ? comm.name : 'öbek #' + n.community);
  document.getElementById('pDesc').textContent = n.description || '(açıklama yok)';
  const oneriler = sugFor(n);
  document.getElementById('pConnTitle').textContent =
    `bağlantılar (${n.conns.length}${oneriler.length ? ' + ' + oneriler.length + ' öneri' : ''})`;
  const box = document.getElementById('pConns');
  box.innerHTML = '';
  n.conns.forEach(({ node: c, rel }) => {
    const b = document.createElement('button');
    b.className = 'conn';
    b.textContent = (c.ghost ? '✕ ' : '→ ') + c.label;
    if (rel) {
      const r = document.createElement('span');
      r.className = 'rel'; r.textContent = '  · ' + rel;
      b.appendChild(r);
    }
    b.onclick = () => { camX = W / 2 / zoom - c.x; camY = H / 2 / zoom - c.y; selectNode(c); };
    box.appendChild(b);
  });
  // AI onerileri: ✚ kabul -> sunucu [[link]]'i KAYNAK notun icine yazar +
  // gunluge isler; ✗ ret -> cift kalici ret listesine girer, bir daha onerilmez.
  // Harita kendi basina kenar uydurmaz/saklamaz - tek gercek kaynak notlardir.
  oneriler.forEach(({ node: c, neden, sug }) => {
    const b = document.createElement('button');
    b.className = 'conn sug';
    b.textContent = '≈ ' + c.label;
    b.title = 'AI önerisi (' + (sug.kaynak || 'ollama') + '): ' + neden;
    const r = document.createElement('span');
    r.className = 'rel'; r.textContent = '  · ' + neden;
    b.appendChild(r);
    const ret = document.createElement('span');
    ret.className = 'kabul'; ret.textContent = '✗';
    ret.title = 'reddet — bir daha önerilmez';
    ret.onclick = async (ev) => {
      ev.stopPropagation();
      try { await zihinPost('/api/graph/oneri/reddet', { id: sug.id }); } catch (e) {}
      refreshOneriler(); // sunucu 'oneri' sinyali de yollar; bu aninda tepki icin
    };
    const k = document.createElement('span');
    k.className = 'kabul'; k.textContent = '✚ kabul';
    k.title = 'kabul et — [[link]] nota yazılır';
    k.onclick = async (ev) => {
      ev.stopPropagation();
      try { await zihinPost('/api/graph/oneri/kabul', { id: sug.id }); } catch (e) {}
      refreshOneriler(); // gercek kenar WS yenilemesiyle gelir
    };
    b.appendChild(ret);
    b.appendChild(k);
    b.onclick = () => { camX = W / 2 / zoom - c.x; camY = H / 2 / zoom - c.y; selectNode(c); };
    box.appendChild(b);
  });
}
document.getElementById('panelClose').onclick = () => { panel.classList.remove('open'); selectedNode = null; };

// --- arama ---
document.getElementById('search').addEventListener('input', (e) => {
  searchTerm = e.target.value.trim().toLowerCase();
});

// --- 🤖 oneri: local Ollama'dan YENI baglanti onerisi ister; sonuc sunucudaki
// kalici kuyruga girer (reddedilmisler otomatik elenir). Opsiyonel katman -
// Ollama yoksa hata mesaji gosterir, haritanin geri kalani ayni calisir.
const sugBtn = document.getElementById('sugBtn');
function sugBadge() {
  sugBtn.textContent = sugEdges.length ? `🤖 ${sugEdges.length} öneri bekliyor` : '🤖 öneri iste';
  sugBtn.classList.toggle('on', sugEdges.length > 0);
  sugBtn.disabled = false;
}
sugBtn.addEventListener('click', async () => {
  sugBtn.textContent = '🤖 düşünüyor…'; sugBtn.disabled = true;
  try {
    const q = new URLSearchParams();
    if (params.get('key')) q.set('key', params.get('key'));
    if (showAI.checked) q.set('gizli', '1');
    const r = await fetch('/api/graph/suggest' + (q.toString() ? '?' + q : ''));
    if (!r.ok) throw new Error(await r.text());
    sugEdges = (await r.json()).filter(s => byId[s.source] && byId[s.target]);
    sugBadge();
    if (selectedNode) selectNode(selectedNode);
  } catch (e) {
    sugBtn.textContent = '🤖 ' + String(e.message || 'olmadı').slice(0, 34);
    setTimeout(sugBadge, 4000);
  }
  sugBtn.disabled = false;
});

// --- ⬇ disa aktar: motor (zihin-haritasi .venv) uzerinden. Motor bu makinede
// yoksa buton hic gorunmez. svg/graphml/neo4j indirilir; obsidian/wiki klasore
// yazilir ve yol gosterilir.
(async () => {
  try {
    // dikkat: `params` bu satirlardan SONRA tanimlaniyor (TDZ) - burada dogrudan oku
    const p = new URLSearchParams(location.search);
    const q = p.get('key') ? '?key=' + encodeURIComponent(p.get('key')) : '';
    const m = await fetch('/api/motor' + q).then((r) => r.json());
    if (m && m.var) document.getElementById('expWrap').style.display = '';
  } catch {}
})();
const expMenu = document.getElementById('expMenu');
[['svg', 'SVG görsel'], ['graphml', 'GraphML (Gephi/yEd)'], ['neo4j', 'Neo4j Cypher'], ['obsidian', 'Obsidian kasası'], ['wiki', 'Wiki sayfaları']].forEach(([f, ad]) => {
  const b = document.createElement('button');
  b.textContent = ad;
  b.style.cssText = 'display:block;width:100%;text-align:left;margin:2px 0';
  b.onclick = async () => {
    expMenu.style.display = 'none';
    const q = new URLSearchParams({ format: f });
    if (params.get('key')) q.set('key', params.get('key'));
    if (showAI.checked) q.set('gizli', '1');
    if (f === 'obsidian' || f === 'wiki') {
      b.disabled = true;
      try {
        const r = await fetch('/api/graph/export?' + q);
        if (!r.ok) throw new Error(await r.text());
        alert('Yazıldı: ' + (await r.json()).klasor);
      } catch (e) { alert('olmadı: ' + String(e.message).slice(0, 120)); }
      b.disabled = false;
    } else {
      location.href = '/api/graph/export?' + q; // indirme olarak gelir
    }
  };
  expMenu.appendChild(b);
});
document.getElementById('expBtn').onclick = () => {
  expMenu.style.display = expMenu.style.display === 'none' ? '' : 'none';
};

// --- 📊 zihin raporu: saglik + obek butunlugu + sasirtici baglantilar + sorular ---
const raporEl = document.getElementById('rapor');
document.getElementById('raporClose').onclick = () => raporEl.classList.remove('open');
document.getElementById('rprBtn').onclick = async () => {
  if (raporEl.classList.contains('open')) { raporEl.classList.remove('open'); return; }
  raporEl.classList.add('open');
  const body = document.getElementById('raporBody');
  body.textContent = 'yükleniyor…';
  try {
    const q = new URLSearchParams();
    if (params.get('key')) q.set('key', params.get('key'));
    if (showAI.checked) q.set('gizli', '1');
    const r = await fetch('/api/graph/rapor' + (q.toString() ? '?' + q : '')).then(x => x.json());
    renderRapor(r, body);
  } catch (e) { body.textContent = 'rapor alınamadı: ' + (e.message || e); }
};
// 💬 zihne sor: GraphRAG - soru grafta gezilir, ilgili notlar toplanir,
// local AI SADECE o baglamla cevaplar (uydurmasin diye)
document.getElementById('sorInput').addEventListener('keydown', async (e) => {
  if (e.key !== 'Enter') return;
  const q = e.target.value.trim();
  if (!q) return;
  const out = document.getElementById('sorCevap');
  out.textContent = '🤔 grafta geziliyor, notlar okunuyor…';
  try {
    const qs = new URLSearchParams({ q });
    if (params.get('key')) qs.set('key', params.get('key'));
    if (showAI.checked) qs.set('gizli', '1');
    const r = await fetch('/api/graph/query?' + qs).then((x) => x.json());
    out.textContent = r.cevap || r.hata || r.not || 'cevap yok';
    if (r.kullanilan && r.kullanilan.length) {
      const k = document.createElement('div');
      k.className = 'kaynaklar';
      k.textContent = '📎 dayandığı notlar: ' + r.kullanilan.join(' · ');
      out.appendChild(k);
    }
  } catch (err) { out.textContent = 'olmadı: ' + (err.message || err); }
});

function renderRapor(r, body) {
  body.innerHTML = '';
  const h = (t) => { const d = document.createElement('div'); d.className = 'rTitle'; d.textContent = t; body.appendChild(d); };
  const li = (t, cls) => { const d = document.createElement('div'); d.className = 'rLine' + (cls ? ' ' + cls : ''); d.textContent = t; body.appendChild(d); return d; };
  h('Sağlık');
  if (r.saglik.durum === 'temiz') li('✅ temiz — kopuk uç / öz-döngü / çift kenar / kırık link yok');
  else {
    if (r.saglik.ozdongu) li('⚠️ ' + r.saglik.ozdongu + ' öz-döngü atıldı (not kendine [[link]] veriyor)');
    if (r.saglik.cift) li('⚠️ ' + r.saglik.cift + ' çift kenar birleştirildi');
    if (r.saglik.kirikLink) li('⚠️ ' + r.saglik.kirikLink + ' kırık [[link]] — hedef notlar henüz yok');
  }
  if (r.topluluklar && r.topluluklar.length) {
    h('Öbek bütünlüğü (1.0 = tamamen içine dönük)');
    r.topluluklar.forEach(c => li(`${c.name} — ${c.size} üye · bütünlük ${c.butunluk}`));
  }
  if (r.sasirtici && r.sasirtici.length) {
    h('Şaşırtıcı bağlantılar (iki öbek arası TEK köprü)');
    r.sasirtici.forEach(s => {
      const d = li(`${s.a} ↔ ${s.b}${s.relation ? ' · ' + s.relation : ''}  (${s.obekA} ⇄ ${s.obekB})`, 'clickable');
      d.title = 'tıkla: haritada bu köprüyü vurgula';
      d.onclick = () => {
        const a = nodes.find(n => n.label === s.a), b = nodes.find(n => n.label === s.b);
        if (a && b) { pathIds = findPath(a, b); pathPick = null; }
      };
    });
  }
  if (r.sorular && r.sorular.length) {
    h('Sorulmaya değer');
    r.sorular.forEach(s => li('❓ ' + s));
  }
  if (r.yetimler && r.yetimler.length) {
    h('Yetimler (hiç bağlantısız)');
    li(r.yetimler.join(' · '));
  }
  li(`${r.dugum} düğüm · ${r.kenar} kenar · bekleyen öneri: ${r.bekleyenOneri}`, 'dim');
}

// --- efsane (legend): grafta bulunan tiplere gore kurulur ---
const legend = document.getElementById('legend');
function buildLegend() {
  legend.innerHTML = '';
  [...new Set(nodes.map(n => n.type))].forEach(t => {
    const item = document.createElement('div');
    item.className = 'legend-item' + (hiddenTypes.has(t) ? ' off' : '');
    item.innerHTML = `<span class="sw" style="background:${COLORS[t] || COLORS.not}"></span>${TYPE_LABELS[t] || t}`;
    item.onclick = () => {
      if (hiddenTypes.has(t)) hiddenTypes.delete(t); else hiddenTypes.add(t);
      item.classList.toggle('off');
    };
    legend.appendChild(item);
  });
}

// --- veri: /api/graph'tan cek, notlar degisince yeniden cek ---
// ?key= parolasi URL'den tasinir; AI-Hafiza notlari haritadaki 🧠 anahtariyla
// acilir/kapanir (tercih localStorage'da kalir, ?gizli=1 ile de acilabilir)
const params = new URLSearchParams(location.search);
const showAI = document.getElementById('showAI');
showAI.checked = params.get('gizli') === '1' || localStorage.getItem('haritaAI') === '1';
showAI.addEventListener('change', () => {
  localStorage.setItem('haritaAI', showAI.checked ? '1' : '0');
  refresh();
});
function graphUrl() {
  const q = new URLSearchParams();
  if (params.get('key')) q.set('key', params.get('key'));
  if (showAI.checked) q.set('gizli', '1');
  return '/api/graph' + (q.toString() ? '?' + q : '');
}
let reloadTimer = null;
async function refresh() {
  try {
    const g = await fetch(graphUrl()).then(r => r.json());
    loadGraph(g);
  } catch (e) { /* sunucu gecici kapali olabilir, sonraki sinyalde tekrar dener */ }
}
function scheduleRefresh() { clearTimeout(reloadTimer); reloadTimer = setTimeout(refresh, 400); }

refresh().then(refreshOneriler);

// canli senkron: not eklenince/degisince/silinince harita kendini gunceller;
// oneri kuyrugu degisince (baska cihaz/ajan) oneriler de tazelenir
try {
  const wsKey = params.get('key') ? '?key=' + encodeURIComponent(params.get('key')) : '';
  const ws = new WebSocket((location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host + '/' + wsKey);
  ws.onmessage = (ev) => {
    let m; try { m = JSON.parse(ev.data); } catch { return; }
    if (m.type === 'list' || m.type === 'content') scheduleRefresh();
    if (m.type === 'oneri') refreshOneriler();
  };
} catch (e) { /* ws yoksa harita yine de acilir, sadece canli guncellenmez */ }
</script>
</body>
