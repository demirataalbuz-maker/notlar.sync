name: Release

# v1.0.0 gibi bir tag push'laninca 3 isletim sistemi icin
# kurulum dosyalarini derler ve GitHub Release'e ekler.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # release olusturma/asset yukleme icin sart

jobs:
  build:
    strategy:
      fail-fast: false # bir OS patlarsa digerleri yine de cikssin
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # package.json versiyonunu tag'den al: v1.2.3 -> 1.2.3
      # (yoksa asset'ler eski versiyon adiyla yanlis release'e gider)
      - run: npm version --no-git-tag-version "${GITHUB_REF_NAME#v}"
        shell: bash
      - run: npm ci
      - run: npm run bundle:mcp
      - run: npm test
        if: matrix.os == 'ubuntu-latest'
      - run: npm run check
      - run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
